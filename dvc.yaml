stages:
  feature_engineering:
    cmd: python src/features.py
    deps:
      - src/features.py
      - data/raw/turbofan/train_FD001.txt
      - data/raw/turbofan/test_FD001.txt
      - data/raw/turbofan/RUL_FD001.txt
    outs:
      - data/processed/features_train.parquet
      - data/processed/features_test.parquet

  train_df_model:
    cmd: python src/models/rul_regressor.py
    deps:
      - src/models/rul_regressor.py
      - data/processed/features_train.parquet
      - data/processed/features_test.parquet
    outs:
      - artifacts/feature_importance.png