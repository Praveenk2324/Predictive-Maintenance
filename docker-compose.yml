services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    volumes:
      - ./chroma_db:/app/chroma_db
    environment:
      - DB_HOST=postgres
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: pm_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: maintenance_logs
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d maintenance_logs"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: pm_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlartifacts:/app/mlartifacts
      - ./artifacts:/app/artifacts
      - mlflow_db:/app/db        # Named volume for mlflow.db — avoids the file-vs-directory problem
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  pgdata:
  mlflow_db:                     # Named volume — Docker manages this, no file collision