version: '3.8'

services:
  api:
    build: .
    container_name: pm_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      # This tells the API to look for the database container!
      - DB_HOST=postgres 
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: pm_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: maintenance_logs
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: