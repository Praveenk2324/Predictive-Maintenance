services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: pm_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mlflow
    volumes:
      - ./chroma_db:/app/chroma_db
    environment:
      - DB_HOST=postgres
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pm_frontend
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: pm_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: maintenance_logs
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mlflow:
    image: python:3.12-slim
    container_name: pm_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
      - ./mlartifacts:/app/mlartifacts
      - ./artifacts:/app/artifacts
    working_dir: /app
    command: sh -c "pip install mlflow && mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns --host 0.0.0.0 --port 5000 --allowed-hosts '*'"
    restart: unless-stopped

volumes:
  pgdata: